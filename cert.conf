# Configuration for Certificate Generation
# ----------------------------------------
# Encryption cipher for private key at rest (must be supported by OpenSSL pkey, e.g., aes256)
CIPHER="aes256"

# Asymmetric Public Key Algorithm (e.g., ed25519, rsa)
ASYM_ALGO="ed25519"

# Certificate Validity Period (in days)
CA_DAYS="3650"
CERT_DAYS="365"

# Common Names (CN)
CA_CN="Default Root CA"
INTERMEDIATE_CN="Default Intermediate CA"
CLIENT_CN="Default Client Certificate"

# Output directory for certificates
OUTPUT_DIR="./certs"

# File name defaults
PRIVKEY_FILENAME="privkey.pem"
CERT_FILENAME="certs.pem"
CHAIN_FILENAME="fullchain.pem"
SECRET_FILENAME="secret.txt"

# If CLIENT_CSR is set to an existing file, it will sign this CSR instead of
# generating a new private key and CSR for the client.
# CLIENT_CSR="./my-client.csr"
